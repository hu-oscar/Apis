[toolchain]
# Pinned to AVM-cached 3.1.8 (system has 3.1.15 but it's not in AVM's release archive).
# Per migration guide §0, 3.1.10+ is recommended — 3.1.8 works fine with Anchor 1.0.2 in practice.
solana_version = "3.1.8"

[tooling]
# Opt out of surfpool (Anchor 1.0 default) since it isn't installed on this
# machine and W1 tests use solana-bankrun (in-process, no validator needed).
# Per migration guide §9.
validator = "solana"

[features]
resolution = true
skip-lint = false

[programs.localnet]
apis_program = "2qe8YXciSpony5vjwxZAYJZ7WfRzSHKRdRzSiH868mhf"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "pnpm ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.test.ts"

[hooks]
