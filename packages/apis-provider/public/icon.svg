<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Apis brand mark — honeycomb cluster of four pointy-top hexagons.
    Two outlined cells (Solana green + violet) and two filled cells
    (violet + green satellite). Same proportions as the favicon
    (app/icon.svg) and the React component (apis-logo.tsx),
    scaled up to a 256-unit viewBox (factor ×256/28 = ×9.143).

    Transparent background — composite onto whatever canvas the
    consuming context wants.
  -->

  <!-- Hex A — top-left, outlined Solana green. -->
  <path d="M100.57 54.86 L132.21 73.14 L132.21 109.71 L100.57 128.00 L68.94 109.71 L68.94 73.14 Z"
        stroke="#14F195" stroke-width="14" stroke-linejoin="round"/>

  <!-- Hex B — top-right, filled violet. -->
  <path d="M163.93 54.86 L195.57 73.14 L195.57 109.71 L163.93 128.00 L132.30 109.71 L132.30 73.14 Z"
        fill="#9945FF"/>

  <!-- Hex C — bottom-middle, outlined violet. -->
  <path d="M132.21 109.71 L163.85 128.00 L163.85 164.57 L132.21 182.86 L100.57 164.57 L100.57 128.00 Z"
        stroke="#9945FF" stroke-width="14" stroke-linejoin="round"/>

  <!-- Hex D — bottom-right satellite, filled green, smaller (r=3 vs r=4). -->
  <path d="M195.55 146.29 L219.30 159.99 L219.30 187.43 L195.55 201.14 L171.80 187.43 L171.80 159.99 Z"
        fill="#14F195"/>
</svg>
