[package]
name = "apis-provider"
version = "0.1.0"
description = "Apis Provider — desktop runtime that manages the apis_worker child process and exposes status to the dashboard UI."
authors = ["Apis"]
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "apis_provider_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
# `tray-icon` lights up the macOS / Windows / Linux status-bar icon
# APIs (Sprint 2.7). Without it, `tauri::tray::*` is gated behind a
# cfg flag and won't compile.
# `image-png` pulls in the PNG decoder used by `Image::from_bytes`,
# which the tray module relies on to load its embedded state icons.
tauri = { version = "2", features = ["tray-icon", "image-png"] }
tauri-plugin-opener = "2"
# Persistent key/value store for settings (HF_TOKEN, PINATA_JWT,
# APIS_API_BASE, python_path, …). Writes JSON to the app's local
# data dir; hot-reloads across windows.
tauri-plugin-store = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Tokio is already a transitive dep of tauri; we depend on it directly
# so we can pull in the `process` + `io-util` features for the worker
# subprocess wiring.
tokio = { version = "1", features = ["process", "io-util", "rt-multi-thread", "sync", "macros"] }

