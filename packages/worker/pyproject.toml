# Apis worker — Python sidecar.
#
# W1 scope: subscribe to Solana devnet via WebSocket, decode JobCreated
# events emitted by apis_program, log each job to stdout. Real Flux Schnell
# inference + IPFS upload + completion submission land in W2.

[project]
name = "apis-worker"
version = "0.1.0"
description = "Apis worker — Python sidecar that listens for JobCreated events and (in W2+) runs inference"
requires-python = ">=3.12"
license = { text = "MIT" }
dependencies = [
    "solana>=0.36.6,<0.37",
    "solders>=0.26.0,<0.27",
    "borsh-construct>=0.1.0,<0.2",
    "websockets>=15.0,<16",
    "Pillow>=11.0",
    "ImageHash>=4.3.2",
]

[project.scripts]
apis-worker = "apis_worker.__main__:run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["apis_worker"]
